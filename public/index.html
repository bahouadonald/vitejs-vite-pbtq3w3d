<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doniel Zik — La Musique. Un Scan. Un Monde.</title>

    <!-- ═══ PWA META TAGS ═══ -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1a6bff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Doniel Zik" />

    <!-- ═══ ICÔNES APPLE (iOS) ═══ -->
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png" />

    <!-- ═══ FAVICON ═══ -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96x96.png" />

    <!-- ═══ SEO / Open Graph ═══ -->
    <meta name="description" content="Distribution musicale via QR Code. Scannez une pochette et accédez à la musique instantanément." />
    <meta property="og:title" content="Doniel Zik" />
    <meta property="og:description" content="La Musique. Un Scan. Un Monde." />
    <meta property="og:image" content="/icons/icon-512x512.png" />
    <meta property="og:url" content="https://doniel.vercel.app" />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <div id="root"></div>

    <!-- ═══ ENREGISTREMENT DU SERVICE WORKER ═══ -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js')
            .then((reg) => {
              console.log('[SW] Enregistré avec succès:', reg.scope);
            })
            .catch((err) => {
              console.error('[SW] Erreur:', err);
            });
        });
      }
    </script>

    <!-- ═══ BOUTON INSTALLATION PWA ═══ -->
    <script>
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        // Déclencher depuis React via window.installPWA()
        window.installPWA = async () => {
          if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            console.log('[PWA] Installation:', outcome);
            deferredPrompt = null;
          }
        };
        // Notifier React que l'installation est disponible
        window.dispatchEvent(new CustomEvent('pwaInstallAvailable'));
      });

      window.addEventListener('appinstalled', () => {
        console.log('[PWA] Application installée !');
        deferredPrompt = null;
      });
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
