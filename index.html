    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { background: #0E2A52 !important; }
      #root { background: #0E2A52; min-height: 100vh; }

      #splash {
        position: fixed; inset: 0;
        background:
          radial-gradient(circle at 50% 38%, rgba(60,150,255,0.28), transparent 55%),
          linear-gradient(165deg, #0A2148 0%, #0E2A52 50%, #143665 100%);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        z-index: 99999; opacity: 1; transition: opacity 0.5s ease;
        font-family: -apple-system, 'DM Sans', sans-serif;
      }
      #splash.hiding { opacity: 0; pointer-events: none; }

      #logo-wrap { position: relative; margin-bottom: 38px; display: flex; align-items: center; justify-content: center; }
      #logo-glow {
        position: absolute; width: 230px; height: 230px; border-radius: 50%;
        background: radial-gradient(circle, rgba(60,150,255,0.4), rgba(91,176,255,0.15) 45%, transparent 70%);
        filter: blur(10px); animation: glowPulse 3.5s ease-in-out infinite;
      }
      #logo-img {
        position: relative; width: 120px; height: 120px; object-fit: contain;
        animation: breathe 3.5s ease-in-out infinite;
        filter: drop-shadow(0 8px 28px rgba(0,0,0,0.45));
      }
      @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
      @keyframes glowPulse { 0%,100% { opacity: 0.6; transform: scale(1); } 50% { opacity: 1; transform: scale(1.12); } }

      #splash-title { text-align: center; margin-bottom: 30px; }
      #splash-title .line {
        font-size: 26px; font-weight: 800; color: #ffffff;
        letter-spacing: 0.5px; line-height: 1.25; opacity: 0;
        animation: fadeUp 0.7s ease forwards;
      }
      #splash-title .line:nth-child(1) { animation-delay: 0.2s; }
      #splash-title .line:nth-child(2) { animation-delay: 0.45s; color: #5BB0FF; }
      #splash-title .line:nth-child(3) { animation-delay: 0.7s; color: #F5C84C; }
      @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

      #splash-bar-wrap { width: 200px; background: rgba(255,255,255,0.1); border-radius: 99px; height: 4px; overflow: hidden; margin-bottom: 16px; }
      #splash-bar-inner {
        width: 0%; height: 100%;
        background: linear-gradient(90deg, #0A84FF, #5BB0FF);
        border-radius: 99px; transition: width 0.4s ease;
        box-shadow: 0 0 12px rgba(91,176,255,0.7);
      }
      #splash-msg { color: rgba(255,255,255,0.45); font-size: 12px; letter-spacing: 1px; min-height: 18px; }
      #splash-tagline {
        position: absolute; bottom: 42px; color: rgba(170,190,220,0.6);
        font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; font-weight: 600;
      }
      #root { opacity: 0; transition: opacity 0.3s ease; }
      #root.ready { opacity: 1; }
    </style>
