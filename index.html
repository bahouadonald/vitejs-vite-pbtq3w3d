<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/icon-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Doniel Zik" />
    <meta name="theme-color" content="#0E2A52" />
    <meta name="description" content="Doniel Zik — l'écosystème des créateurs africains. Musique, cinéma, humour, publicité." />
    <link rel="manifest" href="/manifest.json" />
    <meta property="og:title" content="Doniel Zik" />
    <meta property="og:description" content="L'économie créative africaine. Créer. Diffuser. Monétiser." />
    <meta property="og:image" content="/icons/icon-512x512.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://doniel.art" />
    <title>Doniel Zik — Créer. Diffuser. Monétiser.</title>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { background: #0E2A52 !important; }
      #root { background: #0E2A52; min-height: 100vh; opacity: 1; }

      #splash {
        position: fixed; inset: 0;
        background:
          radial-gradient(circle at 50% 38%, rgba(60,150,255,0.28), transparent 55%),
          linear-gradient(165deg, #0A2148 0%, #0E2A52 50%, #143665 100%);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        z-index: 99999; opacity: 1; transition: opacity 0.35s ease;
        font-family: -apple-system, 'DM Sans', sans-serif;
      }
      #splash.hiding { opacity: 0; pointer-events: none; }

      #logo-wrap { position: relative; margin-bottom: 38px; display: flex; align-items: center; justify-content: center; }
      #logo-glow {
        position: absolute; width: 230px; height: 230px; border-radius: 50%;
        background: radial-gradient(circle, rgba(60,150,255,0.4), rgba(91,176,255,0.15) 45%, transparent 70%);
        filter: blur(10px); animation: glowPulse 3.5s ease-in-out infinite;
      }
      /* Le logo a un fond blanc : "screen" rend ce blanc transparent sur le fond bleu foncé */
      #logo-img {
        position: relative; width: 120px; height: 120px; object-fit: contain;
        animation: breathe 3.5s ease-in-out infinite;
        filter: drop-shadow(0 8px 28px rgba(0,0,0,0.45));
        mix-blend-mode: screen;
      }
      @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
      @keyframes glowPulse { 0%,100% { opacity: 0.6; transform: scale(1); } 50% { opacity: 1; transform: scale(1.12); } }

      #splash-title { text-align: center; margin-bottom: 30px; }
      #splash-title .line {
        font-size: 26px; font-weight: 800; color: #ffffff;
        letter-spacing: 0.5px; line-height: 1.25; opacity: 0;
        animation: fadeUp 0.7s ease forwards;
      }
      #splash-title .line:nth-child(1) { animation-delay: 0.2s; }
      #splash-title .line:nth-child(2) { animation-delay: 0.45s; color: #5BB0FF; }
      #splash-title .line:nth-child(3) { animation-delay: 0.7s; color: #F5C84C; }
      @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

      #splash-bar-wrap { width: 200px; background: rgba(255,255,255,0.1); border-radius: 99px; height: 4px; overflow: hidden; margin-bottom: 16px; }
      #splash-bar-inner {
        width: 0%; height: 100%;
        background: linear-gradient(90deg, #0A84FF, #5BB0FF);
        border-radius: 99px; animation: barFill 1.4s ease forwards;
        box-shadow: 0 0 12px rgba(91,176,255,0.7);
      }
      @keyframes barFill { to { width: 100%; } }
      #splash-tagline {
        position: absolute; bottom: 42px; color: rgba(170,190,220,0.6);
        font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; font-weight: 600;
      }
    </style>
  </head>

  <body>
    <div id="splash">
      <div id="logo-wrap">
        <div id="logo-glow"></div>
        <img id="logo-img" src="/icons/icon-512x512.png" alt="Doniel Zik"
          onerror="this.onerror=null; this.src='/icons/icon-192x192.png';" />
      </div>
      <div id="splash-title">
        <div class="line">Créer.</div>
        <div class="line">Diffuser.</div>
        <div class="line">Monétiser.</div>
      </div>
      <div id="splash-bar-wrap"><div id="splash-bar-inner"></div></div>
      <div id="splash-tagline">Un scan, une musique, un monde</div>
    </div>

    <div id="root"></div>

    <script>
      // Le splash se cache dès que l'app React est prête (signal window.__hideSplash),
      // avec un filet de sécurité à 1,6s maximum. Un seul écran de chargement, pas de doublon.
      (function () {
        var hidden = false;
        function hideSplash() {
          if (hidden) return;
          hidden = true;
          var s = document.getElementById('splash');
          if (s) {
            s.classList.add('hiding');
            setTimeout(function () { if (s && s.parentNode) s.remove(); }, 400);
          }
        }
        window.__hideSplash = hideSplash;
        setTimeout(hideSplash, 1600);
      })();
    </script>

    <script>
      // Chargeur MediaPipe À LA DEMANDE : rien n'est téléchargé au démarrage.
      // window.__loadFaceMesh() ne charge le modèle QUE lorsqu'un effet visage est choisi.
      window.__faceMeshReady = null;
      window.__loadFaceMesh = function () {
        if (window.__faceMeshReady) return window.__faceMeshReady;
        window.__faceMeshReady = new Promise(function (resolve, reject) {
          var s = document.createElement('script');
          s.src = 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.js';
          s.crossOrigin = 'anonymous';
          s.onload = function () { resolve(window.TasksVision || null); };
          s.onerror = function () { reject(new Error('mediapipe_load_failed')); };
          document.head.appendChild(s);
        });
        return window.__faceMeshReady;
      };
    </script>

    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(console.error);
        });
      }
    </script>
  </body>
</html>
