    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { background: #070B14 !important; }
      #root { background: #070B14; min-height: 100vh; }

      #splash {
        position: fixed;
        inset: 0;
        background:
          radial-gradient(circle at 50% 38%, rgba(47,128,255,0.18), transparent 55%),
          linear-gradient(165deg, #050816 0%, #0B1224 50%, #111C38 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        opacity: 1;
        transition: opacity 0.5s ease;
        font-family: -apple-system, 'DM Sans', sans-serif;
      }

      #splash.hiding { opacity: 0; pointer-events: none; }

      #logo-wrap {
        position: relative;
        margin-bottom: 38px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #logo-glow {
        position: absolute;
        width: 230px;
        height: 230px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(47,128,255,0.35), rgba(77,163,255,0.12) 45%, transparent 70%);
        filter: blur(10px);
        animation: glowPulse 3.5s ease-in-out infinite;
      }
      #logo-img {
        position: relative;
        width: 110px;
        height: 110px;
        object-fit: contain;
        animation: breathe 3.5s ease-in-out infinite;
        filter: drop-shadow(0 8px 24px rgba(0,0,0,0.4));
      }

      @keyframes breathe {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.06); }
      }
      @keyframes glowPulse {
        0%, 100% { opacity: 0.6; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.12); }
      }

      #splash-title { text-align: center; margin-bottom: 30px; }
      #splash-title .line {
        font-size: 26px; font-weight: 800; color: #ffffff;
        letter-spacing: 0.5px; line-height: 1.25; opacity: 0;
        animation: fadeUp 0.7s ease forwards;
      }
      #splash-title .line:nth-child(1) { animation-delay: 0.2s; }
      #splash-title .line:nth-child(2) { animation-delay: 0.45s; color: #4DA3FF; }
      #splash-title .line:nth-child(3) { animation-delay: 0.7s; color: #F5C84C; }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }

      #splash-bar-wrap {
        width: 200px; background: rgba(255,255,255,0.08);
        border-radius: 99px; height: 4px; overflow: hidden; margin-bottom: 16px;
      }
      #splash-bar-inner {
        width: 0%; height: 100%;
        background: linear-gradient(90deg, #2F80FF, #4DA3FF);
        border-radius: 99px; transition: width 0.4s ease;
        box-shadow: 0 0 12px rgba(77,163,255,0.6);
      }

      #splash-msg { color: rgba(255,255,255,0.4); font-size: 12px; letter-spacing: 1px; min-height: 18px; }

      #splash-tagline {
        position: absolute; bottom: 42px; color: rgba(148,163,184,0.55);
        font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; font-weight: 600;
      }

      #root { opacity: 0; transition: opacity 0.3s ease; }
      #root.ready { opacity: 1; }
    </style>

      <div id="splash-title">
        <div class="line">Créer.</div>
        <div class="line">Diffuser.</div>
        <div class="line">Monétiser.</div>
      </div>

        <div id="splash-bar-inner"></div>
      </div>

    <div id="root"></div>

    <script>
      var progress = 0;
      var bar = document.getElementById('splash-bar-inner');
      var msg = document.getElementById('splash-msg');
      var msgs = ['Initialisation...', 'Chargement de votre univers...', 'Connexion sécurisée...', 'Presque prêt...'];
      var mi = 0;
      var t = setInterval(function() {
        progress = Math.min(progress + Math.random() * 12, 90);
        bar.style.width = progress + '%';
        if (progress > 20 && mi === 0) { mi = 1; msg.textContent = msgs[1]; }
        if (progress > 50 && mi === 1) { mi = 2; msg.textContent = msgs[2]; }
        if (progress > 75 && mi === 2) { mi = 3; msg.textContent = msgs[3]; }
      }, 400);
      window.__hideSplash = function() {
        clearInterval(t);
        bar.style.width = '100%';
        msg.textContent = 'Bienvenue !';
        setTimeout(function() {
          var root = document.getElementById('root');
          if (root) root.classList.add('ready');
          var splash = document.getElementById('splash');
          if (splash) { splash.classList.add('hiding'); setTimeout(function() { splash.remove(); }, 500); }
        }, 400);
      };
    </script>

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(console.error);
        });
      }
