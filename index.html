<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/icon-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Doniel Zik" />
    <meta name="theme-color" content="#FFFFFF" />
    <meta name="description" content="Doniel Zik — l'écosystème des créateurs africains. Musique, cinéma, humour, publicité." />
    <link rel="manifest" href="/manifest.json" />
    <meta property="og:title" content="Doniel Zik" />
    <meta property="og:description" content="L'économie créative africaine. Créer. Diffuser. Monétiser." />
    <meta property="og:image" content="/icons/icon-512x512.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://doniel.art" />
    <title>Doniel Zik — Créer. Diffuser. Monétiser.</title>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { background: #FFFFFF !important; }
      #root { background: #FFFFFF; min-height: 100vh; opacity: 1; }

      #splash {
        position: fixed; inset: 0;
        background: #FFFFFF;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        z-index: 99999; opacity: 1; transition: opacity 0.35s ease;
        font-family: -apple-system, 'DM Sans', sans-serif;
      }
      #splash.hiding { opacity: 0; pointer-events: none; }

      #logo-wrap { position: relative; margin-bottom: 34px; display: flex; align-items: center; justify-content: center; }
      #logo-img {
        position: relative; width: 120px; height: 120px; object-fit: contain;
        animation: breathe 3s ease-in-out infinite;
      }
      @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }

      #splash-title { text-align: center; margin-bottom: 28px; }
      #splash-title .line {
        font-size: 26px; font-weight: 800; color: #0E2A52;
        letter-spacing: 0.5px; line-height: 1.25; opacity: 0;
        animation: fadeUp 0.6s ease forwards;
      }
      #splash-title .line:nth-child(1) { animation-delay: 0.15s; }
      #splash-title .line:nth-child(2) { animation-delay: 0.30s; color: #0A84FF; }
      #splash-title .line:nth-child(3) { animation-delay: 0.45s; color: #0A84FF; }
      @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

      #splash-bar-wrap { width: 200px; background: rgba(14,42,82,0.1); border-radius: 99px; height: 4px; overflow: hidden; margin-bottom: 16px; }
      #splash-bar-inner {
        width: 0%; height: 100%;
        background: linear-gradient(90deg, #0A84FF, #5BB0FF);
        border-radius: 99px; animation: barFill 1.2s ease forwards;
      }
      @keyframes barFill { to { width: 100%; } }
      #splash-tagline {
        position: absolute; bottom: 42px; color: rgba(14,42,82,0.45);
        font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; font-weight: 600;
      }
    </style>
  </head>

  <body>
    <div id="splash">
      <div id="logo-wrap">
        <img id="logo-img" src="/icons/icon-512x512.png" alt="Doniel Zik"
          onerror="this.onerror=null; this.src='/icons/icon-192x192.png';" />
      </div>
      <div id="splash-title">
        <div class="line">Créer.</div>
        <div class="line">Diffuser.</div>
        <div class="line">Monétiser.</div>
      </div>
      <div id="splash-bar-wrap"><div id="splash-bar-inner"></div></div>
      <div id="splash-tagline">Un scan, une musique, un monde</div>
    </div>

    <div id="root"></div>

    <script>
      // Le splash se cache dès que l'app React est prête (signal envoyé par main.tsx),
      // avec un filet de sécurité à 1,5s maximum si le signal n'arrive pas.
      (function () {
        var hidden = false;
        function hideSplash() {
          if (hidden) return;
          hidden = true;
          var s = document.getElementById('splash');
          if (s) {
            s.classList.add('hiding');
            setTimeout(function () { if (s && s.parentNode) s.remove(); }, 400);
          }
        }
        // Signal envoyé par l'app quand elle a fini de monter
        window.__hideSplash = hideSplash;
        // Filet de sécurité : 1,5s maximum
        setTimeout(hideSplash, 1500);
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(console.error);
        });
      }
    </script>
  </body>
</html>
